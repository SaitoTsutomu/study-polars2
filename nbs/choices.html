<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polars 100+ノック 四択問題</title>
  <style>
    :root {
      color-scheme: light;
      --border: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --bg: #f9fafb;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 32px auto;
    }

    header,
    .question,
    .result {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    header {
      margin-bottom: 16px;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1.3;
    }

    h1 {
      font-size: 24px;
    }

    h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }

    .progress {
      margin-top: 8px;
      color: var(--muted);
    }

    p {
      margin: 12px 0;
    }

    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: #f3f4f6;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
    }

    pre {
      overflow-x: auto;
      margin: 12px 0;
      padding: 14px;
      border-radius: 6px;
      background: #111827;
      color: #f9fafb;
    }

    pre code {
      padding: 0;
      background: transparent;
      white-space: pre;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .choice {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
    }

    .choice:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .choice input {
      margin-top: 5px;
    }

    .choice-label {
      min-width: 18px;
      font-weight: 700;
    }

    .choice-body {
      min-width: 0;
      flex: 1;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      min-width: 96px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .result {
      margin-top: 16px;
      text-align: center;
    }

    .score {
      margin: 8px 0 0;
      font-size: 36px;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Polars 100+ノック 四択問題</h1>
      <div class="progress" id="progress"></div>
    </header>

    <section class="question" id="question"></section>

    <div class="actions">
      <button id="prev" type="button">前へ</button>
      <button class="primary" id="next" type="button">次へ</button>
    </div>

    <section class="result hidden" id="result">
      <h2>結果</h2>
      <div class="score" id="score"></div>
    </section>
  </main>

  <script>
    const state = {
      questions: [],
      answers: [],
      index: 0,
    };

    const elements = {
      progress: document.querySelector("#progress"),
      question: document.querySelector("#question"),
      prev: document.querySelector("#prev"),
      next: document.querySelector("#next"),
      result: document.querySelector("#result"),
      score: document.querySelector("#score"),
    };

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function renderInline(text) {
      return escapeHtml(text).replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function renderMarkdown(markdown) {
      const blocks = [];
      const fencePattern = /```[\s\S]*?```/g;
      let lastIndex = 0;
      for (const match of markdown.trim().matchAll(fencePattern)) {
        if (match.index > lastIndex) {
          blocks.push(markdown.trim().slice(lastIndex, match.index));
        }
        blocks.push(match[0]);
        lastIndex = match.index + match[0].length;
      }
      if (lastIndex < markdown.trim().length) {
        blocks.push(markdown.trim().slice(lastIndex));
      }
      return blocks.map((block) => {
        if (block.startsWith("```")) {
          const code = block.replace(/^```[^\n]*\n?/, "").replace(/\n?```$/, "");
          return `<pre><code>${escapeHtml(code)}</code></pre>`;
        }
        return block
          .trim()
          .split(/\n{2,}/)
          .filter(Boolean)
          .map((paragraph) => `<p>${renderInline(paragraph).replaceAll("\n", "<br>")}</p>`)
          .join("");
      }).join("");
    }

    function parseQuestions(markdown) {
      return markdown
        .split(/^## 問題 /m)
        .slice(1)
        .map((section) => {
          const answerMatch = section.match(/\n正答:\s*([A-D])\s*$/);
          const titleMatch = section.match(/^([^\n]+)/);
          const options = [...section.matchAll(/^### ([A-D])\n\n([\s\S]*?)(?=^### [A-D]\n\n|\n正答:)/gm)]
            .map((match) => ({ label: match[1], body: match[2].trim() }));
          const body = section
            .replace(/^[^\n]+\n+/, "")
            .replace(/^### [A-D]\n\n[\s\S]*?(?=^### [A-D]\n\n|\n正答:)/gm, "")
            .replace(/\n正答:\s*[A-D]\s*$/, "")
            .trim();

          return {
            title: titleMatch[1],
            body,
            options,
            answer: answerMatch[1],
          };
        });
    }

    function renderQuestion() {
      const question = state.questions[state.index];
      const selected = state.answers[state.index];
      elements.progress.textContent = `${state.index + 1} / ${state.questions.length}`;
      elements.question.innerHTML = `
        <h2>${renderInline(question.title)}</h2>
        ${renderMarkdown(question.body)}
        <div class="choices">
          ${question.options.map((option) => `
            <label class="choice">
              <input type="radio" name="answer" value="${option.label}" ${selected === option.label ? "checked" : ""}>
              <span class="choice-label">${option.label}</span>
              <span class="choice-body">${renderMarkdown(option.body)}</span>
            </label>
          `).join("")}
        </div>
      `;
      elements.prev.disabled = state.index === 0;
      elements.next.disabled = !selected;
      elements.next.textContent = state.index === state.questions.length - 1 ? "採点する" : "次へ";
      elements.result.classList.add("hidden");
    }

    function showScore() {
      const correct = state.questions.filter((question, index) => question.answer === state.answers[index]).length;
      const score = Math.round((correct / state.questions.length) * 100);
      elements.score.textContent = `${score} 点`;
      elements.result.classList.remove("hidden");
    }

    elements.question.addEventListener("change", (event) => {
      if (event.target.name === "answer") {
        state.answers[state.index] = event.target.value;
        elements.next.disabled = false;
      }
    });

    elements.prev.addEventListener("click", () => {
      if (state.index > 0) {
        state.index -= 1;
        renderQuestion();
      }
    });

    elements.next.addEventListener("click", () => {
      if (state.index < state.questions.length - 1) {
        state.index += 1;
        renderQuestion();
        return;
      }
      showScore();
    });

    fetch("./choices.md")
      .then((response) => response.text())
      .then((markdown) => {
        state.questions = parseQuestions(markdown);
        state.answers = Array(state.questions.length).fill(null);
        renderQuestion();
      });
  </script>
</body>
</html>
